<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#15233B" />
<title>Code Pénal CI — jeu de révision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="bg" aria-hidden="true">
  <span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span>
</div>

<div class="wrap">
  <header class="app">
    <svg class="seal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 3v18M6 21h12M12 6l-7 2 3.5 6a3.5 3.5 0 0 1-7 0L8 8M12 6l7 2-3.5 6a3.5 3.5 0 0 0 7 0L16 8M12 4.5a1.2 1.2 0 1 0 0-.01"/>
    </svg>
    <div class="title">Code pénal — révision<small>Concours de la magistrature · Côte d'Ivoire</small></div>
  </header>

  <section id="menu" class="screen">
    <p class="lead" id="lead">Chargement des questions…</p>
    <div class="chips" id="chips" role="group" aria-label="Filtrer par thème">
      <button class="chip" data-cat="all" aria-pressed="true">Tout</button>
      <button class="chip" data-cat="G" aria-pressed="false">Généralités</button>
      <button class="chip" data-cat="P" aria-pressed="false">Personnes</button>
      <button class="chip" data-cat="B" aria-pressed="false">Biens</button>
      <button class="chip" data-cat="PR" aria-pressed="false">Procédure</button>
    </div>
    <div class="modes" id="modes" aria-busy="true">
      <button class="mode" data-mode="quiz" disabled>
        <span class="ic" aria-hidden="true">?</span>
        <span class="mode-txt"><h3>Quiz classique</h3><p>12 questions, 3 vies, séries bonus.</p></span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </button>
      <button class="mode" data-mode="cards" disabled>
        <span class="ic" aria-hidden="true">&#9636;</span>
        <span class="mode-txt"><h3>Cartes-éclair</h3><p>Question d'un côté, réponse de l'autre.</p></span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </button>
      <button class="mode" data-mode="duel" disabled>
        <span class="ic" aria-hidden="true">&#9201;</span>
        <span class="mode-txt"><h3>Duel contre la montre</h3><p>60 secondes, un maximum de bonnes réponses.</p></span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </button>
      <button class="mode mode-exam" data-mode="exam" disabled>
        <span class="ic" aria-hidden="true">&#9878;</span>
        <span class="mode-txt"><h3>Examen blanc</h3><p>20 questions chronométrées, note sur 20, correction à la fin.</p></span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </button>
    </div>
    <div class="best">
      <div class="b"><span>Meilleur quiz</span><strong id="best-quiz">0</strong></div>
      <div class="b"><span>Meilleur duel</span><strong id="best-duel">0</strong></div>
      <div class="b"><span>Meilleure note</span><strong id="best-exam">—</strong></div>
    </div>
    <button class="footlink" id="reset">Réinitialiser ma progression</button>
  </section>

  <section id="play" class="screen" hidden>
    <div class="hud" id="p-hud"></div>
    <div class="timerbar" id="p-timerbar" hidden><i id="p-timerfill"></i></div>
    <div class="qcard" id="p-card">
      <span class="qtag" id="p-tag">Question</span>
      <p class="qtext" id="p-q">…</p>
      <div class="opts" id="p-opts"></div>
      <div class="fb" id="p-fb"></div>
      <button class="btn next" id="p-next">Continuer</button>
    </div>
    <div class="row"><button class="btn ghost" id="p-quit">Quitter</button></div>
  </section>

  <section id="cards" class="screen" hidden>
    <div class="hud">
      <div class="lhs"><div class="pill"><span>Carte</span><strong id="c-prog">1</strong></div></div>
      <div class="pill"><span>Restantes</span><strong id="c-left">0</strong></div>
    </div>
    <div class="flash" id="c-flash" role="button" tabindex="0" aria-label="Retourner la carte">
      <div class="flash-inner">
        <div class="face front"><div class="lbl">Question</div><div class="ftxt" id="c-front">…</div></div>
        <div class="face back"><div class="lbl">Réponse</div><div class="ans" id="c-ans"></div><div class="exp" id="c-exp"></div></div>
      </div>
    </div>
    <p class="tap-hint">Touche la carte pour la retourner</p>
    <div class="row" id="c-actions" hidden>
      <button class="btn ghost" id="c-again">À revoir</button>
      <button class="btn" id="c-known">Acquis</button>
    </div>
    <div class="row"><button class="btn ghost" id="c-quit">Quitter</button></div>
  </section>

  <section id="result" class="screen end" hidden>
    <svg class="end-seal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <circle cx="12" cy="9" r="6"/><path d="M9 14l-2 7 5-3 5 3-2-7"/>
    </svg>
    <h2 id="r-title">Partie terminée</h2>
    <div class="score" id="r-score">0</div>
    <p id="r-sub"></p>
    <p class="verdict" id="r-verdict"></p>
    <div id="r-review"></div>
    <div class="row wrap"><button class="btn red" id="r-again">Rejouer</button><button class="btn ghost" id="r-share">Partager mon score</button><button class="btn ghost" id="r-menu">Menu</button></div>
  </section>
</div>

<div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

<script src="script.js" defer></script>
</body>
</html>
